<title>Pannish — スペイン語単語学習</title>
<link rel="apple-touch-icon" href="icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root {
  --ink: #1a1208;
  --paper: #faf7f2;
  --surface: #f0ebe0;
  --border: #ddd4c0;
  --muted: #8a7860;
  --accent: #8a1a1a;
  --green: #2d6a4f;
  --blue: #1a5c8a;
  --beginner: #2d6a4f;
  --intermediate: #c8821a;
  --advanced: #8a1a1a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #e8e0d4; display: flex; justify-content: center; min-height: 100vh; padding: 2rem 1rem; font-family: 'Georgia', serif; }
.app { width: 100%; max-width: 480px; background: var(--paper); border-radius: 20px; box-shadow: 0 8px 40px rgba(0,0,0,0.12); overflow: hidden; color: var(--ink); align-self: flex-start; }

.hdr { padding: 1.1rem 1.5rem 0.9rem; border-bottom: 1px solid var(--border); }
.hdr-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.7rem; }
.logo { font-size: 1.4rem; font-weight: 700; }
.logo span { color: var(--accent); }
.streak { font-size: 0.72rem; color: var(--muted); font-family: sans-serif; background: var(--surface); padding: 3px 10px; border-radius: 20px; }

.level-bar { display: flex; gap: 6px; }
.lv-btn { flex: 1; padding: 6px 8px; border-radius: 9px; border: 1.5px solid var(--border); background: var(--paper); font-family: sans-serif; font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: all 0.15s; color: var(--muted); text-align: center; }
.lv-btn.beginner.active { background: var(--beginner); color: #fff; border-color: var(--beginner); }
.lv-btn.intermediate.active { background: var(--intermediate); color: #fff; border-color: var(--intermediate); }
.lv-btn.advanced.active { background: var(--advanced); color: #fff; border-color: var(--advanced); }
.lv-btn:hover:not(.active) { border-color: var(--muted); color: var(--ink); }

.content { padding: 1.25rem 1.5rem; min-height: 480px; }

.prog-wrap { margin-bottom: 1rem; }
.prog-label { display: flex; justify-content: space-between; font-size: 0.7rem; font-family: sans-serif; color: var(--muted); margin-bottom: 3px; }
.prog-track { height: 4px; background: var(--surface); border-radius: 2px; overflow: hidden; }
.prog-fill { height: 4px; border-radius: 2px; transition: width 0.4s ease; background: var(--accent); }

.word-card { border: 1px solid var(--border); border-radius: 18px; padding: 1.75rem 1.5rem; text-align: center; cursor: pointer; min-height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center; margin-bottom: 0.85rem; transition: all 0.2s; background: var(--paper); border-top: 3px solid var(--accent); }
.word-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
.word-card:active { transform: scale(0.99); }
.word-title { font-size: 1.9rem; font-weight: 700; margin-bottom: 0.25rem; letter-spacing: 0.02em; }
.word-phonetic { font-size: 0.88rem; color: var(--accent); font-family: sans-serif; margin-bottom: 0.2rem; letter-spacing: 0.04em; }
.word-katakana { font-size: 0.78rem; color: var(--muted); font-family: sans-serif; margin-bottom: 0.6rem; }
.word-pos { font-size: 0.68rem; font-family: sans-serif; background: var(--surface); color: var(--muted); padding: 2px 8px; border-radius: 20px; display: inline-block; margin-bottom: 0.6rem; }
.word-meaning { font-size: 1rem; color: var(--accent); font-weight: 700; margin-bottom: 0.45rem; }
.word-example { font-size: 0.8rem; color: var(--muted); font-style: italic; line-height: 1.55; }
.click-hint { font-size: 0.72rem; color: #ccc; font-family: sans-serif; margin-top: 0.65rem; }

.phonetic-box { background: var(--surface); border-radius: 11px; padding: 0.8rem 1rem; margin-bottom: 0.8rem; font-family: sans-serif; }
.phonetic-box-title { font-size: 0.67rem; color: var(--muted); margin-bottom: 5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
.phonetic-symbol { font-size: 0.95rem; color: var(--accent); font-weight: 700; margin-bottom: 4px; }
.phonetic-desc { font-size: 0.78rem; color: var(--ink); line-height: 1.65; }

.syn-panel { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 0.85rem; }
.syn-header { background: var(--surface); padding: 0.5rem 0.9rem; font-size: 0.67rem; font-family: sans-serif; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }
.syn-row { display: flex; align-items: flex-start; padding: 0.55rem 0.9rem; border-bottom: 1px solid var(--border); gap: 0.7rem; }
.syn-row:last-child { border-bottom: none; }
.syn-word { font-size: 0.88rem; font-weight: 700; color: var(--ink); min-width: 100px; font-family: 'Georgia', serif; flex-shrink: 0; }
.syn-word.current { color: var(--accent); }
.syn-detail { font-size: 0.76rem; color: var(--muted); font-family: sans-serif; line-height: 1.5; flex: 1; }
.syn-tag { display: inline-block; font-size: 0.6rem; font-family: sans-serif; font-weight: 700; padding: 1px 6px; border-radius: 4px; margin-bottom: 2px; }
.syn-tag.casual { background: #e8f5f0; color: var(--green); }
.syn-tag.formal { background: #f8e8e8; color: var(--accent); }
.syn-tag.neutral { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
.syn-tag.specific { background: #fdf0e8; color: #c8821a; }

.mic-box { border: 1px solid var(--border); border-radius: 12px; padding: 1rem; margin-bottom: 0.85rem; font-family: sans-serif; }
.mic-box-title { font-size: 0.68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.75rem; }
.mic-btn { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 10px; font-family: sans-serif; font-weight: 700; font-size: 0.88rem; cursor: pointer; transition: all 0.2s; background: var(--surface); color: var(--ink); }
.mic-btn.listening { background: #fee; border-color: #c0392b; color: #c0392b; animation: pulse 1s infinite; }
.mic-btn:hover:not(.listening) { border-color: var(--muted); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
.mic-status { font-size: 0.78rem; color: var(--muted); text-align: center; margin-top: 0.55rem; min-height: 1.2em; }
.mic-result { margin-top: 0.75rem; border-top: 1px solid var(--border); padding-top: 0.75rem; }
.mic-result-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.35rem; }
.mic-result-label { font-size: 0.7rem; color: var(--muted); }
.mic-result-val { font-size: 0.9rem; font-weight: 700; }
.mic-result-val.correct { color: var(--green); }
.mic-result-val.wrong { color: #c0392b; }
.mic-advice { font-size: 0.78rem; color: var(--ink); background: var(--surface); border-radius: 8px; padding: 0.6rem 0.8rem; margin-top: 0.6rem; line-height: 1.6; }

.btn { border: none; border-radius: 9px; padding: 0.65rem 1.1rem; cursor: pointer; font-family: sans-serif; font-weight: 700; font-size: 0.85rem; transition: all 0.15s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { opacity: 0.88; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }
.btn-outline:hover { border-color: var(--muted); color: var(--ink); }
.loop-badge { display: inline-block; font-size: 0.68rem; font-family: sans-serif; background: var(--surface); color: var(--muted); padding: 3px 10px; border-radius: 20px; margin-bottom: 0.85rem; }
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-top">
      <div class="logo">🇪🇸 Pann<span>ish</span></div>
      <div class="streak" id="streak-lbl">🔥 0日連続</div>
    </div>
    <div class="level-bar">
      <button class="lv-btn beginner active" onclick="setLevel('beginner')">🟢 初級</button>
      <button class="lv-btn intermediate" onclick="setLevel('intermediate')">🟡 中級</button>
      <button class="lv-btn advanced" onclick="setLevel('advanced')">🔴 上級</button>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

let level = "beginner";
let queue = [];
let currentIdx = 0;
let flipped = false;
let lapCount = 0;
let streak = parseInt(localStorage.getItem("ll_es_streak") || "0");
let lastDate = localStorage.getItem("ll_es_lastdate") || "";

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function init() {
  buildQueue();
  updateStreak();
  render();
}

function buildQueue() {
  queue = shuffle(VOCAB[level]);
  currentIdx = 0;
  flipped = false;
  lapCount = 0;
}

function updateStreak() {
  document.getElementById("streak-lbl").textContent = `🔥 ${streak}日連続`;
}

function markStreak() {
  const today = new Date().toISOString().split("T")[0];
  if (lastDate !== today) {
    streak++;
    lastDate = today;
    localStorage.setItem("ll_es_streak", streak);
    localStorage.setItem("ll_es_lastdate", today);
    updateStreak();
  }
}

function setLevel(lv) {
  level = lv;
  document.querySelectorAll(".lv-btn").forEach(b => b.classList.remove("active"));
  document.querySelector(".lv-btn." + lv).classList.add("active");
  buildQueue();
  render();
}

function render() {
  const el = document.getElementById("content");
  const card = queue[currentIdx];
  const total = queue.length;
  const pct = Math.round((currentIdx / total) * 100);

  el.innerHTML = `
    ${lapCount > 0 ? `<div class="loop-badge">🔁 ${lapCount}周目</div>` : ""}
    <div class="prog-wrap">
      <div class="prog-label">
        <span>${currentIdx + 1} / ${total}</span>
        <span>${pct}%</span>
      </div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>

    <div class="word-card" onclick="flipCard()">
      <div class="word-pos">${card.pos}</div>
      <div class="word-title">${card.word}</div>
      <div class="word-phonetic">${card.phonetic}</div>
      <div class="word-katakana">📢 ${card.katakana}</div>
      ${flipped ? `
        <div class="word-meaning">${card.meaning}</div>
        <div class="word-example">"${card.example}"</div>
      ` : `<div class="click-hint">クリックして意味を確認</div>`}
    </div>

    ${flipped ? `
      <div class="phonetic-box">
        <div class="phonetic-box-title">🔤 発音のポイント</div>
        <div class="phonetic-symbol">${card.phonetic}</div>
        <div class="phonetic-desc">${card.phoneticGuide}</div>
      </div>

      <div style="display:flex;gap:0.6rem;margin-bottom:0.85rem">
        <button class="btn btn-primary" style="flex:1;font-size:0.8rem"
          onclick="speak('${card.word.replace(/'/g,"\\'")}')">🔊 発音を聞く</button>
        <button class="btn" id="mic-btn" style="flex:1;font-size:0.8rem;background:var(--surface);border:1px solid var(--border)"
          onclick="startMic('${card.word.replace(/'/g,"\\'")}')">🎤 話してみる</button>
      </div>

      <div class="mic-box" id="mic-box" style="display:none">
        <div class="mic-box-title">🎤 発音チェック</div>
        <div class="mic-status" id="mic-status">ボタンを押して話してください</div>
        <div id="mic-result"></div>
      </div>

      <div class="syn-panel">
        <div class="syn-header">🔄 シチュエーション別の言い換え</div>
        ${card.synonyms.map(s => `
          <div class="syn-row">
            <div class="syn-word ${s.word === card.word ? "current" : ""}">${s.word}</div>
            <div class="syn-detail">
              <span class="syn-tag ${s.tag}">${s.tag === "casual" ? "カジュアル" : s.tag === "formal" ? "フォーマル" : s.tag === "specific" ? "場面限定" : "一般的"}</span><br>
              ${s.desc}
            </div>
          </div>`).join("")}
      </div>

      <button class="btn btn-primary" style="width:100%" onclick="nextCard()">次へ →</button>
    ` : ""}
  `;
}

function flipCard() { flipped = true; render(); }

function nextCard() {
  markStreak();
  currentIdx++;
  flipped = false;
  if (currentIdx >= queue.length) {
    lapCount++;
    queue = shuffle(VOCAB[level]);
    currentIdx = 0;
  }
  render();
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const trySpeak = () => {
    const voices = window.speechSynthesis.getVoices();
    const u = new SpeechSynthesisUtterance(text);
    const googleVoice = voices.find(v => v.lang.startsWith('es') && v.name.includes('Google'));
    const esVoice = voices.find(v => v.lang.startsWith('es'));
    if (googleVoice) u.voice = googleVoice;
    else if (esVoice) u.voice = esVoice;
    u.lang = 'es-ES';
    u.rate = 0.82;
    u.pitch = 1;
    window.speechSynthesis.speak(u);
  };
  if (window.speechSynthesis.getVoices().length === 0) {
    window.speechSynthesis.onvoiceschanged = trySpeak;
  } else {
    trySpeak();
  }
}

const ES_PHONETIC_ADVICE = {
  "r": "r → 舌先を上顎に軽く当てて巻き舌に。語末や語中のrに注意",
  "rr": "rr → 強い巻き舌。舌を震わせて「ルル」のように",
  "v": "v → スペイン語のvはbに近い音。唇を合わせて「バ」",
  "h": "h → スペイン語のhは発音しない（silent h）",
  "j": "j/x → 喉の奥から出す強いh音。「ハ」より強く",
  "ll": "ll → 「ジェ」または「イェ」（地域により異なる）",
  "default": "もう一度ゆっくり、はっきりと話してみてください"
};

function getESAdvice(target, recognized) {
  const t = target.toLowerCase();
  const r = recognized.toLowerCase();
  if (r === t) return "完璧です！ネイティブに通じる発音です 🎉";
  if (t.includes("rr")) return ES_PHONETIC_ADVICE["rr"];
  if (t.startsWith("h")) return ES_PHONETIC_ADVICE["h"];
  if (t.includes("ll")) return ES_PHONETIC_ADVICE["ll"];
  if (t.includes("j") || t.includes("x")) return ES_PHONETIC_ADVICE["j"];
  const similarity = [...t].filter((c, i) => r[i] === c).length / t.length;
  if (similarity > 0.6) return "惜しい！もう少しゆっくり、はっきり発音してみて";
  return ES_PHONETIC_ADVICE["default"];
}

let recognition = null;

function startMic(targetWord) {
  const box = document.getElementById("mic-box");
  const status = document.getElementById("mic-status");
  const result = document.getElementById("mic-result");
  const btn = document.getElementById("mic-btn");

  if (!("webkitSpeechRecognition" in window) && !("SpeechRecognition" in window)) {
    box.style.display = "block";
    status.textContent = "Chromeでのみ動作します";
    return;
  }

  box.style.display = "block";
  result.innerHTML = "";

  if (recognition) { recognition.stop(); recognition = null; }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = "es-ES";
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.maxAlternatives = 5;

  recognition.onstart = () => {
    btn.classList.add("listening");
    btn.textContent = "🔴 録音中...";
    status.textContent = "「" + targetWord + "」と話してください";
  };

  recognition.onresult = (e) => {
    let recognized = "";
    for (let i = e.resultIndex; i < e.results.length; i++) {
      recognized = e.results[i][0].transcript.trim().toLowerCase();
      if (e.results[i].isFinal) break;
    }
    if (!recognized) return;
    const target = targetWord.toLowerCase();
    const isCorrect = recognized === target;
    const advice = getESAdvice(target, recognized);

    result.innerHTML = `
      <div class="mic-result">
        <div class="mic-result-row">
          <span class="mic-result-label">目標</span>
          <span class="mic-result-val">${targetWord}</span>
        </div>
        <div class="mic-result-row">
          <span class="mic-result-label">認識結果</span>
          <span class="mic-result-val ${isCorrect ? "correct" : "wrong"}">${recognized} ${isCorrect ? "✅" : "❌"}</span>
        </div>
        <div class="mic-advice">${advice}</div>
        <button class="mic-btn" style="margin-top:0.6rem" onclick="startMic('${targetWord}')">🎤 もう一度</button>
      </div>`;
    status.textContent = "";
  };

  recognition.onerror = (e) => {
    status.textContent = e.error === "no-speech" ? "声が聞こえませんでした。もう一度試してください" : "エラー: " + e.error;
    btn.classList.remove("listening");
    btn.textContent = "🎤 話してみる";
  };

  recognition.onend = () => {
    btn.classList.remove("listening");
    btn.textContent = "🎤 話してみる";
    recognition = null;
  };

  recognition.start();
}
